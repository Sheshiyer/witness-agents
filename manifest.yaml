# ─── PROTOCOLS ────────────────────────────────────────────────
protocols:
  petrae:
    description: >
      Fractal compressed inter-agent communication protocol.
      768 single-word instructions, 10-50x compression vs English.
      Every morpheme = 3-tuple (Field-Form-Friction) = (Kha-Ba-La).
    language: kuthipoic
    seed: 19912564

  clifford_clock:
    description: >
      Algebraic substrate gating — determines which Clifford algebra
      is active for the current query context. Gates retrieval depth
      and synthesis complexity.
    algebras: [Cl(0), Cl(1), Cl(2), Cl(3), Cl(7)]

  akshara:
    description: >
      Sanskrit morpheme engine — AKSHARA (अक्षर) = "that which doesn't perish".
      Sanskrit morphemes ARE meaning (not labels pointing at meaning).
      The imperishable seed that regenerates agent identity.

