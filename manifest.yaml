  sequence:
    - phase: annamaya
      action: "Create directories, validate schema, mount filesystem"
    - phase: pranamaya
      action: "Install dependencies, wire data flows, configure APIs"
    - phase: manomaya
      action: "Seed memory, configure PETRAE protocol, load patterns"
    - phase: vijnanamaya
      action: "Load Selemene engine mappings, activate Clifford gates"
    - phase: anandamaya
      action: "Inject AKSHARA identity seeds, validate self-reference"
  validation: >
    Each phase validates the previous — naked recursion:
    "fruit tree yielding fruit whose seed is in itself"
