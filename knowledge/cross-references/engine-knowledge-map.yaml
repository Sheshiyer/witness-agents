# Engine-Knowledge Map
# Maps each Selemene Engine to the knowledge domains it draws upon
# This is the routing table that makes interpretation context-aware

engine_domain_map:

  # --- ALETHEIOS PRIMARY ---
  
  chronofield:
    description: "Vimshottari Dasha — planetary period timing"
    primary_domains:
      - lorenz-kundli  # Vimshottari-Markov + Ashtakavarga + Bhava
    secondary_domains:
      - endocrine-muse  # Which hormone/muse activates in this planetary period
      - consciousness-states  # Gebser structure active in this life stage
    interpretation_template: >
      Current Dasha/Antardasha → Lorenz-Kundli state transition probability
      → which hormones/muses are activated → temporal pattern recognition
    variables_needed: [user_birth_data, current_date, dasha_period]

  energetic-authority:
    description: "Human Design authority type"
    primary_domains:
      - lorenz-kundli  # Shadbala tensor for strength assessment
    secondary_domains:
      - endocrine-muse  # Authority type connects to hormonal center
      - bioelectric  # Nadi activation patterns map to HD channels
    interpretation_template: >
      HD Authority → which decision-making center is reliable
      → cross-reference with endocrine center (heart/head/gut)
      → check bioelectric activation for current state
    variables_needed: [user_hd_type, user_authority, user_profile]

  nine-point-architecture:
    description: "Enneagram topology"
    primary_domains:
      - endocrine-muse  # Direct 9-point → hormone → muse mapping
      - social-programming  # Leviathan analysis for social type patterns
    secondary_domains:
      - consciousness-states  # Enneagram stress/growth lines as state transitions
    interpretation_template: >
      Enneagram type → primary hormone/muse → stress/growth line dynamics
      → current hormonal balance → which Muse is calling
    variables_needed: [user_enneagram_type, user_wing, user_instinct_stack]

  hexagram-navigation:
    description: "I Ching state transitions"
    primary_domains:
      - lorenz-kundli  # State transition parallels
      - consciousness-states  # Hexagram change as consciousness state change
    interpretation_template: >
      Current hexagram → changing lines → future hexagram
      → map to Lorenz attractor trajectory (where in phase space?)
    variables_needed: [query_context, hexagram_cast]

  numeric-architecture:
    description: "Archetypal number patterns"
    primary_domains:
      - sacred-geometry  # Numbers as geometric relationships
    secondary_domains:
      - lorenz-kundli  # Numerical patterns in Dasha timing
      - consciousness-states  # Number symbolism in Young's sevenfold
    variables_needed: [user_birth_numbers, current_year_number]

  # --- PICHET PRIMARY ---

  three-wave-cycle:
